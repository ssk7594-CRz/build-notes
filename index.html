<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codename Build Notes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Apps">
        <div class="brand">
          <div class="brand-mark">B</div>
          <div>
            <strong>Build Notes</strong>
            <span>codename</span>
          </div>
        </div>

        <form id="app-form" class="app-form">
          <label for="app-name">관리 중인 앱</label>
          <div class="inline-field">
            <input id="app-name" type="text" placeholder="앱 이름 추가" autocomplete="off" />
            <button type="submit" aria-label="앱 추가">+</button>
          </div>
        </form>

        <nav id="app-list" class="app-list" aria-label="App list"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">next release backlog</p>
            <h1 id="current-app-name">앱을 선택하세요</h1>
          </div>
          <div class="stats" aria-label="Feature stats">
            <div>
              <span id="stat-total">0</span>
              <small>전체</small>
            </div>
            <div>
              <span id="stat-planned">0</span>
              <small>구현 예정</small>
            </div>
            <div>
              <span id="stat-done">0</span>
              <small>구현됨</small>
            </div>
          </div>
        </header>

        <section class="capture-panel" aria-label="Quick capture">
          <form id="feature-form" class="feature-form">
            <input id="feature-title" type="text" placeholder="아 맞다, 이 기능 넣어야 하는데..." autocomplete="off" />
            <input id="feature-version" type="text" placeholder="v1.1" autocomplete="off" />
            <select id="feature-priority" aria-label="우선순위">
              <option value="medium">보통</option>
              <option value="high">높음</option>
              <option value="low">낮음</option>
            </select>
            <select id="feature-status" aria-label="상태">
              <option value="planned">구현할 기능</option>
              <option value="review">검토 중</option>
              <option value="doing">진행 중</option>
              <option value="done">구현됨</option>
              <option value="hold">보류</option>
            </select>
            <button type="submit">추가</button>
          </form>
          <div class="repo-row">
            <label for="repo-url">GitHub</label>
            <input id="repo-url" type="url" placeholder="https://github.com/owner/repo" />
            <button id="save-repo" type="button">연결</button>
          </div>
          <div class="tool-row">
            <input id="feature-search" type="search" placeholder="기능 검색" autocomplete="off" />
            <button id="export-data" type="button">내보내기</button>
            <button id="import-data" type="button">가져오기</button>
            <input id="import-file" type="file" accept="application/json" hidden />
          </div>
        </section>

        <section class="board" aria-label="Feature board">
          <div class="column" data-status="planned">
            <header>
              <h2>구현할 기능</h2>
              <span id="count-planned">0</span>
            </header>
            <div class="cards" id="planned-list"></div>
          </div>
          <div class="column" data-status="review">
            <header>
              <h2>검토 중</h2>
              <span id="count-review">0</span>
            </header>
            <div class="cards" id="review-list"></div>
          </div>
          <div class="column" data-status="doing">
            <header>
              <h2>진행 중</h2>
              <span id="count-doing">0</span>
            </header>
            <div class="cards" id="doing-list"></div>
          </div>
          <div class="column" data-status="done">
            <header>
              <h2>구현됨</h2>
              <span id="count-done">0</span>
            </header>
            <div class="cards" id="done-list"></div>
          </div>
          <div class="column" data-status="hold">
            <header>
              <h2>보류</h2>
              <span id="count-hold">0</span>
            </header>
            <div class="cards" id="hold-list"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="app-button-template">
      <button class="app-button" type="button">
        <span class="app-initial"></span>
        <span class="app-meta">
          <strong></strong>
          <small></small>
        </span>
      </button>
    </template>

    <template id="feature-card-template">
      <article class="feature-card">
        <input class="card-title-input" type="text" aria-label="기능 제목" />
        <div class="card-meta">
          <input class="card-version-input" type="text" aria-label="목표 버전" placeholder="버전" />
          <select class="card-priority-select" aria-label="우선순위 변경">
            <option value="high">높음</option>
            <option value="medium">보통</option>
            <option value="low">낮음</option>
          </select>
        </div>
        <textarea class="card-note-input" aria-label="기능 메모" placeholder="메모"></textarea>
        <div class="card-actions">
          <select class="card-status-select" aria-label="기능 상태 변경">
            <option value="planned">구현할 기능</option>
            <option value="review">검토 중</option>
            <option value="doing">진행 중</option>
            <option value="done">구현됨</option>
            <option value="hold">보류</option>
          </select>
          <button type="button" aria-label="삭제">삭제</button>
        </div>
        <small class="card-updated"></small>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
